<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Bottle body -->
  <rect x="20" y="24" width="24" height="32" rx="4" fill="#cc1111"/>
  <rect x="20" y="24" width="24" height="32" rx="4" fill="none" stroke="#881111" stroke-width="1.5"/>
  <!-- Bottle neck -->
  <rect x="26" y="16" width="12" height="10" rx="2" fill="#cc1111"/>
  <rect x="26" y="16" width="12" height="10" rx="2" fill="none" stroke="#881111" stroke-width="1"/>
  <!-- Cork -->
  <rect x="25" y="12" width="14" height="6" rx="2" fill="#8B6914"/>
  <rect x="25" y="12" width="14" height="6" rx="2" fill="none" stroke="#6B4914" stroke-width="1"/>
  <!-- Liquid shine -->
  <ellipse cx="28" cy="36" rx="4" ry="8" fill="#ff4444" opacity="0.5"/>
  <!-- Highlight -->
  <rect x="23" y="28" width="3" height="12" rx="1.5" fill="white" opacity="0.25"/>
</svg>
